name: Build Android APK

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      binary_url:
        description: 'URL to pre-compiled ollama binary (arm64-v8a)'
        required: false
        default: ''

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Node 18
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: temurin

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Download ollama binary (if not in assets)
        if: ${{ github.event.inputs.binary_url != '' }}
        run: |
          curl -L "${{ github.event.inputs.binary_url }}" \
            -o android/app/src/main/assets/arm64-v8a/ollama
          chmod +x android/app/src/main/assets/arm64-v8a/ollama

      - name: Verify ollama binary exists
        run: |
          if [ ! -f android/app/src/main/assets/arm64-v8a/ollama ]; then
            echo "⚠️  ollama binary not found! Skipping APK build."
            echo "Either commit the binary to assets/ or provide binary_url in workflow_dispatch."
            echo "Use build_ollama_android.sh locally to compile it."
            echo "SKIP_BUILD=true" >> $GITHUB_ENV
          else
            echo "✅ ollama binary: $(du -h android/app/src/main/assets/arm64-v8a/ollama | cut -f1)"
          fi

      - name: Install npm dependencies
        run: npm install

      - name: Build Android APK (release)
        if: env.SKIP_BUILD != 'true'
        run: |
          cd android
          chmod +x gradlew
          # Use debug keystore for CI builds (release signing needs secrets)
          ./gradlew assembleRelease \
            -PMYAPP_RELEASE_STORE_FILE=debug.keystore \
            -PMYAPP_RELEASE_STORE_PASSWORD=android \
            -PMYAPP_RELEASE_KEY_ALIAS=androiddebugkey \
            -PMYAPP_RELEASE_KEY_PASSWORD=android

      - name: Rename APK
        if: env.SKIP_BUILD != 'true'
        run: |
          VERSION=$(cat package.json | grep version | head -1 | awk -F: '{ print $2 }' | sed 's/[",]//g' | tr -d ' ')
          cp android/app/build/outputs/apk/release/app-release.apk \
             "OllamaServer-v${VERSION}.apk"

      - name: Upload APK artifact
        if: env.SKIP_BUILD != 'true'
        uses: actions/upload-artifact@v4
        with:
          name: OllamaServer-APK
          path: OllamaServer-*.apk

      - name: Attach to GitHub Release
        if: env.SKIP_BUILD != 'true' && startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: OllamaServer-*.apk
          generate_release_notes: true
